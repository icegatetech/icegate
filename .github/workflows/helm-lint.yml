name: Helm Lint

on:
  push:
    branches: [ main ]
    paths:
      - 'config/helm/**'
      - '.github/workflows/helm-lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'config/helm/**'
      - '.github/workflows/helm-lint.yml'
  workflow_dispatch:

jobs:
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: v4.1.0

      - name: Lint chart
        run: helm lint config/helm/icegate

      - name: Template chart
        run: helm template icegate config/helm/icegate > /dev/null
