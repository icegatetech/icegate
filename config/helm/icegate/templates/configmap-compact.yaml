{{- if .Values.compact.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "icegate.componentName" (dict "context" . "component" "compact") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "icegate.componentLabels" (dict "context" . "component" "compact") | nindent 4 }}
data:
  maintain.yaml: |
    catalog:
      {{- include "icegate.catalogYaml" . | nindent 6 }}
    storage:
      {{- include "icegate.storageYaml" . | nindent 6 }}
    compaction:
      target_file_size_bytes: {{ .Values.compact.compaction.targetFileSizeBytes | int }}
      max_group_input_bytes: {{ .Values.compact.compaction.maxGroupInputBytes | int }}
      min_input_files: {{ .Values.compact.compaction.minInputFiles }}
      max_skippable_tail_files: {{ .Values.compact.compaction.maxSkippableTailFiles }}
      scan_interval_secs: {{ .Values.compact.compaction.scanIntervalSecs }}
      rewrite_timeout_secs: {{ .Values.compact.compaction.rewriteTimeoutSecs }}
      worker_count: {{ .Values.compact.compaction.workerCount }}
      poll_interval_ms: {{ .Values.compact.compaction.pollIntervalMs }}
      row_group_size: {{ .Values.compact.compaction.rowGroupSize }}
      data_page_size_limit_bytes: {{ .Values.compact.compaction.dataPageSizeLimitBytes | int }}
      logs_enabled: {{ .Values.compact.compaction.tables.logs }}
      spans_enabled: {{ .Values.compact.compaction.tables.spans }}
      events_enabled: {{ .Values.compact.compaction.tables.events }}
      metrics_enabled: {{ .Values.compact.compaction.tables.metrics }}
      jobs_storage:
        endpoint: {{ .Values.compact.compaction.jobsStorage.endpoint | default .Values.storage.s3.endpoint | quote }}
        bucket: {{ .Values.compact.compaction.jobsStorage.bucket | quote }}
        prefix: {{ .Values.compact.compaction.jobsStorage.prefix | quote }}
        region: {{ .Values.compact.compaction.jobsStorage.region | default .Values.aws.region | quote }}
        use_ssl: {{ .Values.compact.compaction.jobsStorage.useSsl }}
        job_state_codec: {{ .Values.compact.compaction.jobsStorage.jobStateCodec }}
        request_timeout_secs: {{ .Values.compact.compaction.jobsStorage.requestTimeoutSecs }}
{{- end }}
