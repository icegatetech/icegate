## Namespace
namespace:
  ## Create the namespace as part of this chart release
  create: false

## Global settings
global:
  nameOverride: ""
  fullnameOverride: ""
  imagePullSecrets: []

## ServiceAccount
serviceAccount:
  create: true
  ## Annotations for the ServiceAccount (e.g. for AWS IRSA)
  ## eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/icegate
  annotations: {}
  name: ""

## Iceberg catalog configuration (shared by all components)
catalog:
  ## Backend type: "rest", "s3tables", or "glue"
  backend: rest
  ## REST catalog settings (used when backend=rest)
  rest:
    uri: http://nessie:19120/iceberg
  ## S3 Tables settings (used when backend=s3tables)
  s3tables:
    tableBucketArn: ""
  ## AWS Glue settings (used when backend=glue)
  glue:
    ## AWS Glue catalog ID (optional; omit or leave empty for default account catalog)
    catalogId: ""
  ## Iceberg warehouse location
  warehouse: "s3://warehouse/"
  ## Additional catalog properties
  properties:
    prefix: main

## Storage configuration (shared by all components)
storage:
  s3:
    bucket: warehouse
    region: us-east-1
    ## Optional S3-compatible endpoint (e.g. MinIO). Omit for real AWS S3.
    endpoint: ""

## Queue (WAL) configuration (shared by query and ingest)
queue:
  common:
    basePath: "s3://queue/"
    channelCapacity: 1024
    maxRowGroupSize: 16384
  read:
    ## LRU cache capacity for parsed Parquet metadata (default: 2048).
    ## Set to 0 to disable caching.
    metadataEntriesCacheCapacity: 2048
  write:
    writeRetries: 3
    compression: zstd
    recordsPerFlushMultiplier: 1
    maxBytesPerFlush: 67108864
    flushIntervalMs: 200

## AWS credentials
aws:
  ## Name of an existing Secret containing aws-access-key-id and aws-secret-access-key keys.
  ## Leave empty when using IRSA/Workload Identity.
  existingSecret: ""
  region: us-east-1

## ---------------------------------------------------------------------------
## Query component
## ---------------------------------------------------------------------------
query:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/icegatetech/icegate-query
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  ## Query engine settings
  engine:
    batchSize: 8192
    targetPartitions: 4
    catalogName: iceberg
    ## Interval (seconds) between background catalog refreshes (default: 15)
    # refreshIntervalSecs: 15
    ## Max age (seconds) before cached provider is considered stale (default: 30)
    # maxAgeSecs: 30
    ## Include WAL (hot) segments in query results (default: false).
    ## When false, queries only read committed Iceberg data.
    ## Note: does not affect /labels, /label_values, or /series — those are Iceberg-only.
    walQueryEnabled: false
    ## Parquet metadata size hint (bytes) for WAL footer reads (default: 65536).
    ## Reduces S3 round-trips for small WAL files. Omit to use DataFusion default.
    walMetadataSizeHint: 65536

  ## FileIO cache configuration (optional)
  cache:
    enabled: true
    memorySizeMb: 1024
    diskDir: /tmp/icegate/cache
    diskSizeMb: 4096
    ## TTL (seconds) for caching stat/HEAD responses (optional, omit to disable)
    statTtlSecs: 300
    ## Max value size (MiB) to cache on writes. Larger files pass through
    ## without caching to avoid eviction storms. Default: 2 MiB.
    maxWriteCacheSizeMb: 2
    ## Volume size for the disk cache (used as emptyDir sizeLimit)
    volumeSizeLimit: 5Gi
    ## Parquet metadata prefetch (warms cache with column/offset indexes
    ## and bloom filters after footer reads — never data pages)
    prefetch:
      enabled: false
      ## maxPrefetchBytes: 4194304  # 4 MiB (metadata is small)
      ## prefetchColumns: []        # empty = all columns

  ## Loki API
  loki:
    enabled: true
    port: 3100

  ## Prometheus API
  prometheus:
    enabled: true
    port: 9090

  ## Tempo API
  tempo:
    enabled: true
    port: 3200

  ## Apache Arrow Flight SQL API (gRPC)
  flightSql:
    enabled: true
    port: 8815
    maxMessageSize: 16777216

  ## Prometheus metrics endpoint
  metrics:
    enabled: true
    port: 9091
    path: /metrics

  ## OpenTelemetry tracing
  tracing:
    enabled: true
    otlpEndpoint: ""
    sampleRatio: 1.0

  ## RUST_LOG level
  rustLog: "info"

  ## Extra environment variables
  extraEnv: []

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

  ## Service
  service:
    type: ClusterIP
    annotations: {}

  ## Ingress
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    #  - host: loki.example.com
    #    paths:
    #      - path: /
    #        pathType: Prefix
    #        port: 3100
    tls: []

  ## PodDisruptionBudget
  pdb:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

  ## Wait for dependencies to be ready before starting the query server.
  ## Uses a busybox init container to poll the endpoints.
  waitForDependencies:
    enabled: false
    image: busybox:1.37
    ## Endpoints to poll (HTTP GET). Query starts only when all return 2xx.
    endpoints: []
    #  - http://nessie:19120/api/v2/config

  ## Liveness and readiness probe overrides
  livenessProbe:
    httpGet:
      path: /ready
      port: 3100
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /ready
      port: 3100
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

## ---------------------------------------------------------------------------
## Ingest component
## ---------------------------------------------------------------------------
ingest:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/icegatetech/icegate-ingest
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  ## Shift configuration (WAL -> Iceberg)
  shift:
    read:
      maxRecordBatchesPerTask: 192
      lowerBoundInputBytesPerTask: 67108864   # 64 MiB — soft target / tail-merge cutoff
      upperBoundInputBytesPerTask: 134217728  # 128 MiB — hard per-task cap
      planSegmentReadParallelism: 8
      shiftSegmentReadParallelism: 8
    write:
      rowGroupSize: 20000
      dataPageSizeLimitBytes: 2097152
      tableCacheTtlSecs: 60
    timeouts:
      planBaseMs: 10000
      shiftBaseMs: 10000
      shiftPerRecordBatchMs: 50
      shiftPerSegmentMs: 300
      commitBaseMs: 30000
      commitPerParquetFileMs: 100
    jobsmanager:
      workerCount: 2
      pollIntervalMs: 1000
      iterationIntervalMillisecs: 30000
      storage:
        ## Defaults to storage.s3.endpoint when empty
        endpoint: ""
        bucket: jobs
        prefix: shifter
        region: ""  # defaults to aws.region
        useSsl: false
        jobStateCodec: json
        requestTimeoutSecs: 5

  ## FileIO cache configuration (optional)
  cache:
    enabled: false
    memorySizeMb: 1024
    diskDir: /tmp/icegate/cache
    diskSizeMb: 4096
    ## TTL (seconds) for caching stat/HEAD responses (optional, omit to disable)
    statTtlSecs: 300
    ## Max value size (MiB) to cache on writes. Larger files pass through
    ## without caching to avoid eviction storms. Default: 2 MiB.
    maxWriteCacheSizeMb: 2
    ## Volume size for the disk cache (used as emptyDir sizeLimit)
    volumeSizeLimit: 5Gi
    ## Parquet metadata prefetch (warms cache with column/offset indexes
    ## and bloom filters after footer reads — never data pages)
    prefetch:
      enabled: false
      ## maxPrefetchBytes: 4194304  # 4 MiB (metadata is small)
      ## prefetchColumns: []        # empty = all columns

  ## OTLP HTTP receiver
  otlpHttp:
    enabled: true
    port: 4318

  ## OTLP gRPC receiver
  otlpGrpc:
    enabled: true
    port: 4317

  ## Prometheus metrics endpoint
  metrics:
    enabled: true
    port: 9091
    path: /metrics

  ## OpenTelemetry tracing
  tracing:
    enabled: true
    otlpEndpoint: ""
    sampleRatio: 1.0

  ## RUST_LOG level
  rustLog: "info"

  ## Extra environment variables
  extraEnv: []

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

  ## Service
  service:
    type: ClusterIP
    annotations: {}

  ## Ingress
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    #  - host: otlp.example.com
    #    paths:
    #      - path: /
    #        pathType: Prefix
    #        port: 4318
    tls: []

  ## PodDisruptionBudget
  pdb:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

  ## Wait for dependencies to be ready before starting the ingest server.
  ## Uses a busybox init container to poll the endpoints.
  waitForDependencies:
    enabled: false
    image: busybox:1.37
    ## Endpoints to poll (HTTP GET). Ingest starts only when all return 2xx.
    endpoints: []
    #  - http://nessie:19120/api/v2/config
    #  - http://minio:9000/minio/health/ready

  ## Liveness and readiness probe overrides
  livenessProbe:
    tcpSocket:
      port: 4317
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: 4317
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

## ---------------------------------------------------------------------------
## Migrate (Helm hook)
## ---------------------------------------------------------------------------
migrate:
  enabled: true

  image:
    repository: ghcr.io/icegatetech/icegate-maintain
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  backoffLimit: 3
  activeDeadlineSeconds: 300
  hookDeletePolicy: before-hook-creation

  ## Wait for catalog and storage to be ready before migrating.
  ## Uses a busybox init container to poll the endpoints.
  waitForDependencies:
    enabled: true
    image: busybox:1.37
    ## Endpoints to poll (HTTP GET). Migrate starts only when all return 2xx.
    endpoints: []
    #  - http://nessie:19120/api/v2/config
    #  - http://rustfs-svc:9000/health/ready

## ---------------------------------------------------------------------------
## Maintain component (long-running `maintain run` service)
## ---------------------------------------------------------------------------
## Background maintenance for the Iceberg tables: Parquet compaction (rewrites
## small data files into fewer, larger ones) and orphan-file GC (reclaims
## unreferenced S3 objects). Runs as a Deployment; each sub-feature loops on its
## own `jobsmanager.scanIntervalSecs`.
##
## Disabled by default: the `maintain run` binary always initialises tracing and
## refuses to start without an OTLP endpoint, so enabling it REQUIRES setting
## `maintain.tracing.otlpEndpoint` (a Helm `required` guard enforces it).
maintain:
  enabled: false
  ## Replicas may be scaled out. The jobmanager distributes rewrite tasks across
  ## all workers in any pod via shared S3 job-state with compare-and-swap, and
  ## commits use optimistic concurrency, so parallel instances are safe. Prefer
  ## scaling `compaction.jobsmanager.workerCount` (in-process parallelism) first; add
  ## replicas for more throughput. All workers on a table contend on a single
  ## job-state object, so horizontal returns taper as replicas grow.
  replicaCount: 1

  image:
    repository: ghcr.io/icegatetech/icegate-maintain
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  ## Compaction tuning (maps to the binary's CompactionConfig).
  compaction:
    ## Desired OUTPUT Parquet file size, in bytes (default: 128 MiB).
    targetFileSizeBytes: 134217728
    ## Hard cap on a rewrite group's summed INPUT bytes (bin-packing budget, default: 256 MiB).
    maxGroupInputBytes: 268435456
    ## Skip a partition with at most this many files and no sub-target tail.
    minInputFiles: 4
    ## Tolerated number of sub-target files when deciding to skip a partition.
    maxSkippableTailFiles: 0
    ## Largest-to-smallest size ratio allowed within one rewrite group. A file is
    ## merged with a larger one only when it is at least 1/ratio of the group's
    ## largest file, so a small file is not repeatedly re-read into a much larger
    ## one. Smaller files merge with each other instead. The gate only applies
    ## while the group's largest file is at or above targetFileSizeBytes; below
    ## target, files merge regardless of skew. Must be at least 1 (0 is rejected
    ## at startup).
    maxMergeSizeRatio: 2
    ## Deadline for a single rewrite task (merge + encode + commit), in seconds.
    ## Kept separate from jobsmanager.scanIntervalSecs so a long-running rewrite is
    ## not declared expired and duplicated by another worker (default: 1 hour).
    rewriteTimeoutSecs: 3600
    ## Parquet row group size, in rows.
    rowGroupSize: 20000
    ## Maximum Parquet data page size, in bytes.
    dataPageSizeLimitBytes: 2097152
    ## Per-table compaction toggles.
    tables:
      logs: true
      spans: true
      events: true
      metrics: true
      operations: true
    ## Jobs-manager settings, nested to mirror ingest's shift.jobsmanager.
    jobsmanager:
      ## Period of the discovery loop, in seconds.
      scanIntervalSecs: 300
      ## Number of concurrent rewrite workers.
      workerCount: 2
      ## Jobmanager worker poll interval, in milliseconds.
      pollIntervalMs: 1000
      ## Jobs-state storage (S3), same shape ingest's shift uses. Credentials are
      ## taken from the AWS env vars injected into the pod, not configured here.
      storage:
        ## Defaults to storage.s3.endpoint when empty.
        endpoint: ""
        bucket: jobs
        prefix: compactor
        region: ""  # defaults to aws.region
        useSsl: false
        jobStateCodec: json
        requestTimeoutSecs: 5

  ## Orphan-file garbage collection (maps to the binary's GcConfig). Reclaims
  ## physical S3 objects — compaction leftovers and leaked files — that table
  ## metadata no longer references and that are older than the grace period. It
  ## runs as its own per-table background loop alongside compaction, with its own
  ## worker pool and a distinct "gc" job-state prefix so it never contends with
  ## compaction's state.
  gc:
    ## Master switch. Off by default so an upgrade never silently begins
    ## deleting; an operator opts in explicitly.
    enabled: false
    ## Per-table GC toggles.
    tables:
      logs: true
      spans: true
      events: true
      metrics: true
      operations: true
    ## Orphan-sweep tuning (maps to GcOrphansConfig).
    orphans:
      ## Whether the sweep runs; when false the per-table task is a no-op cycle.
      enabled: true
      ## Compute and meter orphans but delete nothing (escape hatch).
      dryRun: false
      ## Grace period: an object is deletable only if its last_modified is older
      ## than this. Protects freshly written files and in-flight compaction
      ## outputs not yet referenced by a manifest (default: 7 days).
      minAgeSecs: 604800
      ## Also sweep orphaned Iceberg metadata (manifests, snap-*.avro, superseded
      ## *.metadata.json); when false, only data/ files are swept.
      includeMetadata: true
      ## Max concurrent best-effort object deletions.
      deleteConcurrency: 16
      ## Per-table sweep task deadline, in seconds.
      sweepTimeoutSecs: 3600
    ## Jobs-manager settings. Reuses compaction's shape but with its own worker
    ## pool and a distinct "gc" job-state prefix. Credentials come from the pod's
    ## AWS env vars, not configured here.
    jobsmanager:
      ## Period of the per-table GC discovery loop, in seconds (default: daily).
      scanIntervalSecs: 86400
      ## Number of concurrent GC workers (GC is I/O-bound and runs infrequently).
      workerCount: 2
      ## Jobmanager worker poll interval, in milliseconds.
      pollIntervalMs: 1000
      storage:
        ## Defaults to storage.s3.endpoint when empty.
        endpoint: ""
        bucket: jobs
        prefix: gc
        region: ""  # defaults to aws.region
        useSsl: false
        jobStateCodec: json
        requestTimeoutSecs: 5

  ## Prometheus metrics endpoint. When enabled, the long-running `run` service
  ## installs the global meter provider (so the compactor's CompactMetrics
  ## record) and serves /metrics on this port. Scraped by the per-component
  ## ServiceMonitor (see serviceMonitor.* below) when that is enabled.
  metrics:
    enabled: true
    port: 9091
    path: /metrics

  ## Kubernetes Service exposing the metrics port. Created only when
  ## metrics.enabled — the compactor has no other inbound endpoint.
  service:
    type: ClusterIP
    annotations: {}

  ## OpenTelemetry tracing. The OTLP endpoint is mandatory (see note above):
  ## it is exported as OTEL_EXPORTER_OTLP_ENDPOINT (gRPC, e.g. host:4317).
  tracing:
    otlpEndpoint: ""

  ## RUST_LOG level
  rustLog: "info"

  ## Extra environment variables
  extraEnv: []

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  ## Liveness probe override. Empty by default — the Deployment restarts the
  ## container if the process exits. When metrics.enabled, the /metrics endpoint
  ## (metrics.port) can back an httpGet/tcpSocket probe; set one here to override.
  livenessProbe: {}

  ## Wait for catalog and storage to be ready before starting the compactor.
  ## Uses a busybox init container to poll the endpoints.
  waitForDependencies:
    enabled: false
    image: busybox:1.37
    ## Endpoints to poll (HTTP GET). Compaction starts only when all return 2xx.
    endpoints: []
    #  - http://nessie:19120/api/v2/config
    #  - http://minio:9000/minio/health/ready

## ---------------------------------------------------------------------------
## ServiceMonitor (Prometheus Operator)
## ---------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
