apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - secret-aws.yaml
  - secret-aws-infra.yaml
  - trino

helmGlobals:
  chartHome: ../../../helm

helmCharts:
  - name: minio
    repo: https://charts.min.io
    version: 5.4.0
    releaseName: minio
    namespace: infra
    valuesFile: values-minio.yaml

  - name: nessie
    repo: https://charts.projectnessie.org
    version: 0.107.3
    releaseName: nessie
    namespace: infra
    valuesFile: values-nessie.yaml

  - name: icegate
    releaseName: icegate
    namespace: icegate
    valuesFile: values-icegate.yaml

# Force namespace on resources from charts that omit metadata.namespace.
patches:
  # MinIO → infra
  - target:
      name: minio-sa
      kind: ServiceAccount
    patch: |
      - op: add
        path: /metadata/namespace
        value: infra
  - target:
      name: minio
      kind: ConfigMap
    patch: |
      - op: add
        path: /metadata/namespace
        value: infra
  - target:
      name: minio
      kind: Secret
    patch: |
      - op: add
        path: /metadata/namespace
        value: infra
  - target:
      name: minio
      kind: Service
    patch: |
      - op: add
        path: /metadata/namespace
        value: infra
  - target:
      name: minio-console
      kind: Service
    patch: |
      - op: add
        path: /metadata/namespace
        value: infra
  - target:
      name: minio
      kind: PersistentVolumeClaim
    patch: |
      - op: add
        path: /metadata/namespace
        value: infra
  - target:
      name: minio
      kind: Deployment
    patch: |
      - op: add
        path: /metadata/namespace
        value: infra
  - target:
      name: minio-post-job
      kind: Job
    patch: |
      - op: add
        path: /metadata/namespace
        value: infra
  - target:
      name: minio-cluster
      kind: Probe
    patch: |
      - op: add
        path: /metadata/namespace
        value: infra