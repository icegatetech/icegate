apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
  namespace: infra
  labels:
    app.kubernetes.io/name: trino
    app.kubernetes.io/component: coordinator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: trino
      app.kubernetes.io/component: coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trino
        app.kubernetes.io/component: coordinator
    spec:
      containers:
        - name: trino
          image: trinodb/trino:479
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: AWS_ACCESS_KEY_ID
              value: minioadmin
            - name: AWS_SECRET_ACCESS_KEY
              value: minioadmin
            - name: AWS_REGION
              value: us-east-1
          volumeMounts:
            - name: catalog
              mountPath: /etc/trino/catalog/iceberg.properties
              subPath: iceberg.properties
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /usr/lib/trino/bin/health-check
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /usr/lib/trino/bin/health-check
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 4
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: catalog
          configMap:
            name: trino-config
            items:
              - key: iceberg.properties
                path: iceberg.properties
