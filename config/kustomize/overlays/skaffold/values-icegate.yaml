# IceGate chart values - mapped from Docker Compose query/ingest/migrate configs

## Let the IceGate chart create the namespace from .Release.Namespace
namespace:
  create: true

## Iceberg catalog (shared by all components)
catalog:
  backend: rest
  rest:
    uri: http://nessie.infra.svc.cluster.local.:19120/iceberg
  warehouse: "s3://warehouse/"
  properties:
    prefix: main

## Storage configuration
storage:
  s3:
    bucket: warehouse
    region: us-east-1
    endpoint: http://minio.infra.svc.cluster.local.:9000

## AWS credentials from existing Secret
## Secret keys: aws-access-key-id, aws-secret-access-key (per _helpers.tpl:152-162)
aws:
  existingSecret: icegate-aws-credentials
  region: us-east-1

## Queue (WAL) configuration
queue:
  common:
    basePath: "s3://queue/"

## Query component
query:
  enabled: true
  replicaCount: 1
  engine:
    walQueryEnabled: true
  cache:
    enabled: true
    memorySizeMb: 1024
    diskDir: /tmp/icegate/cache
    diskSizeMb: 4096
    statTtlSecs: 300
    ## emptyDir sizeLimit for the disk cache volume
    volumeSizeLimit: 5Gi
    prefetch:
      enabled: false
  waitForDependencies:
    enabled: true
    endpoints:
      - http://nessie.infra.svc.cluster.local.:19120/api/v2/config
      - http://minio.infra.svc.cluster.local.:9000/minio/health/ready
  loki:
    enabled: true
    port: 3100
  prometheus:
    enabled: true
    port: 9090
  tempo:
    enabled: true
    port: 3200
  flightSql:
    enabled: true
    port: 8815
    maxMessageSize: 16777216
  tracing:
    enabled: true
    otlpEndpoint: http://otel-collector.observability.svc.cluster.local.:4317
    sampleRatio: 1.0
  rustLog: "info,icegate_query=debug,icegate_common=debug,datafusion_tracing=debug,opendal=debug,opendal::services::s3::backend=info,aws_sdk_s3=warn,aws_smithy_http=warn,aws_smithy_client=warn,aws_smithy_runtime=warn,aws_smithy_runtime_api=warn"
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi

## Ingest component
ingest:
  enabled: true
  replicaCount: 1
  waitForDependencies:
    enabled: true
    endpoints:
      - http://nessie.infra.svc.cluster.local.:19120/api/v2/config
      - http://minio.infra.svc.cluster.local.:9000/minio/health/ready
  otlpHttp:
    enabled: true
    port: 4318
  otlpGrpc:
    enabled: true
    port: 4317
  tokioConsole:
    enabled: true
    port: 6669
  tracing:
    enabled: true
    otlpEndpoint: http://otel-collector.observability.svc.cluster.local.:4317
    sampleRatio: 1.0
  shift:
    jobsmanager:
      storage:
        endpoint: http://minio.infra.svc.cluster.local.:9000
        bucket: jobs
        prefix: shifter
        useSsl: false
        jobStateCodec: json
        requestTimeoutSecs: 5
  rustLog: "info,icegate_ingest=debug,icegate_jobmanager=debug,icegate_queue=debug,icegate_common=trace,opendal=debug,opendal::services::s3::backend=info,reqwest_tracing=debug,otel::tracing=debug,tonic_tracing_opentelemetry=debug,aws_sdk_s3=warn,aws_smithy_http=warn,aws_smithy_client=warn,aws_smithy_runtime=warn,aws_smithy_runtime_api=warn"
  resources:
    requests:
      cpu: "2"
      memory: 1.5Gi
    limits:
      cpu: "2"
      memory: 1.5Gi

## ServiceMonitor (Prometheus Operator)
serviceMonitor:
  enabled: true
  labels:
    release: prometheus

## Migrate (runs as Helm hook: pre-install/pre-upgrade)
migrate:
  enabled: true
  backoffLimit: 3
  activeDeadlineSeconds: 300
  waitForDependencies:
    enabled: true
    endpoints:
      - http://nessie.infra.svc.cluster.local.:19120/api/v2/config
      - http://minio.infra.svc.cluster.local.:9000/minio/health/ready

## Maintain service (long-running `maintain run`: compaction + orphan-file GC)
maintain:
  enabled: true
  replicaCount: 1
  waitForDependencies:
    enabled: true
    endpoints:
      - http://nessie.infra.svc.cluster.local.:19120/api/v2/config
      - http://minio.infra.svc.cluster.local.:9000/minio/health/ready
  compaction:
    jobsmanager:
      scanIntervalSecs: 60
      workerCount: 2
      storage:
        endpoint: http://minio.infra.svc.cluster.local.:9000
        bucket: jobs
        prefix: compactor
        useSsl: false
        jobStateCodec: json
        requestTimeoutSecs: 5
  ## Orphan-file GC — enabled with an aggressive dev cadence: sweep every 5
  ## minutes and reclaim files older than 10 minutes (prod defaults are
  ## daily / 7 days). Other fields inherit the chart defaults.
  gc:
    enabled: true
    orphans:
      minAgeSecs: 600
    jobsmanager:
      scanIntervalSecs: 300
      storage:
        endpoint: http://minio.infra.svc.cluster.local.:9000
        bucket: jobs
        prefix: gc
        useSsl: false
        jobStateCodec: json
        requestTimeoutSecs: 5
  tracing:
    otlpEndpoint: http://otel-collector.observability.svc.cluster.local.:4317
  rustLog: "info,icegate_maintain=debug,icegate_jobmanager=debug,icegate_common=debug,opendal=debug,aws_sdk_s3=warn,aws_smithy_http=warn,aws_smithy_client=warn,aws_smithy_runtime=warn,aws_smithy_runtime_api=warn,opendal::services::s3::backend=info"
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
