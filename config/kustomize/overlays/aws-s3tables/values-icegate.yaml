# IceGate chart values - AWS S3Tables deployment

## Let the IceGate chart create the namespace from .Release.Namespace
namespace:
  create: true

## Iceberg catalog (shared by all components)
catalog:
  backend: s3tables
  s3tables:
    tableBucketArn: "arn:aws:s3tables:eu-central-1:<AWS_ACCOUNT_ID>:bucket/<S3TABLES_BUCKET_NAME>"

## Storage configuration
storage:
  s3:
    region: eu-central-1
    endpoint: ""

## AWS credentials from existing Secret
## Secret keys: aws-access-key-id, aws-secret-access-key (per _helpers.tpl:152-162)
aws:
  existingSecret: icegate-aws-credentials
  region: eu-central-1

## Queue (WAL) configuration
queue:
  common:
    basePath: "s3://<S3_BUCKET>/queue"

## Query component
query:
  enabled: true
  replicaCount: 1
  cache:
    enabled: true
    memorySizeMb: 512
    diskDir: /tmp/icegate/cache
    diskSizeMb: 4096
    statTtlSecs: 300
    ## Volume size for the disk cache (emptyDir sizeLimit or PVC storage request)
    volumeSizeLimit: 5Gi
    prefetch:
      enabled: false
  loki:
    enabled: true
    port: 3100
  prometheus:
    enabled: true
    port: 9090
  tempo:
    enabled: true
    port: 3200
  tracing:
    enabled: true
    otlpEndpoint: http://jaeger-collector.observability.svc.cluster.local.:4317
    sampleRatio: 1.0
  rustLog: "info,icegate_query=debug,icegate_common=debug,datafusion_tracing=debug,opendal=debug,aws_sdk_s3=warn,aws_smithy_http=warn,aws_smithy_client=warn,aws_smithy_runtime=warn,aws_smithy_runtime_api=warn"
  resources:
    requests:
      cpu: "2"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 2Gi

## Ingest component
ingest:
  enabled: true
  replicaCount: 1
  otlpHttp:
    enabled: true
    port: 4318
  otlpGrpc:
    enabled: true
    port: 4317
  tracing:
    enabled: true
    otlpEndpoint: http://jaeger-collector.observability.svc.cluster.local.:4317
    sampleRatio: 1.0
  shift:
    jobsmanager:
      storage:
        endpoint: "https://s3.eu-central-1.amazonaws.com"
        bucket: <S3_BUCKET>
        prefix: jobs/shifter
        useSsl: true
        jobStateCodec: json
        requestTimeoutSecs: 5
  rustLog: "info,icegate_ingest=debug,icegate_jobmanager=debug,icegate_queue=debug,icegate_common=debug,otel::tracing=debug,tonic_tracing_opentelemetry=debug,aws_sdk_s3=warn,aws_smithy_http=warn,aws_smithy_client=warn,aws_smithy_runtime=warn,aws_smithy_runtime_api=warn"
  resources:
    requests:
      cpu: "2"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 1Gi

## ServiceMonitor (Prometheus Operator)
serviceMonitor:
  enabled: true
  labels:
    release: prometheus

## Migrate (runs as Helm hook: pre-install/pre-upgrade)
migrate:
  enabled: true
  backoffLimit: 3
  activeDeadlineSeconds: 300
