# MinIO (S3-compatible object storage) - standalone mode for development
image:
  repository: minio/minio
  tag: RELEASE.2025-02-28T09-55-16Z
  pullPolicy: IfNotPresent

mode: standalone
replicas: 1

rootUser: minioadmin
rootPassword: minioadmin

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi

service:
  type: ClusterIP
  port: 9000

consoleService:
  type: ClusterIP
  port: 9001

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "3"
    memory: 2Gi

# Create buckets on startup (replaces job-rustfs-init.yaml)
buckets:
  - name: warehouse
    policy: none
    purge: false
  - name: queue
    policy: none
    purge: false
  - name: jobs
    policy: none
    purge: false

# Prometheus ServiceMonitor (replaces servicemonitor-rustfs.yaml)
metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
