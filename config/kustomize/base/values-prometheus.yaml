# kube-prometheus-stack - Prometheus Operator, Prometheus, kube-state-metrics, node-exporter

# Grafana is deployed separately via its own Helm chart
grafana:
  enabled: false

# AlertManager not needed for dev
alertmanager:
  enabled: false

# Prometheus server configuration
prometheus:
  prometheusSpec:
    # Scrape all ServiceMonitors/Probes in any namespace (override chart
    # default that filters on release=prometheus label).
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    probeNamespaceSelector: {}
    probeSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

    retention: 7d

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "1"
        memory: 2Gi

# CRDs managed by separate prometheus-operator-crds chart (skaffold-crds.yaml)
crds:
  enabled: false

# Prometheus Operator
prometheusOperator:
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 256Mi

# kube-state-metrics
kube-state-metrics:
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 128Mi

# node-exporter
prometheus-node-exporter:
  resources:
    requests:
      cpu: 200m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 64Mi
