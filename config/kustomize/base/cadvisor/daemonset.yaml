apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: observability
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/component: container-metrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cadvisor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadvisor
        app.kubernetes.io/component: container-metrics
    spec:
      # OrbStack's kubelet runs with PodAndContainerStatsFromCRI=true, which
      # disables the embedded cAdvisor container metric collection. We deploy
      # the upstream cAdvisor as a DaemonSet so Prometheus still receives
      # `container_*` series. Reading host cgroup/docker state requires
      # privileged mounts, hence the relaxed securityContext below.
      serviceAccountName: cadvisor
      automountServiceAccountToken: false
      hostPID: false
      hostNetwork: false
      tolerations:
        - operator: Exists
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.55.1
          args:
            - --housekeeping_interval=10s
            - --max_housekeeping_interval=15s
            - --event_storage_event_limit=default=0
            - --event_storage_age_limit=default=0
            - --disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,cpu_topology,resctrl
            - --store_container_labels=false
            - --whitelisted_container_labels=io.kubernetes.container.name,io.kubernetes.pod.name,io.kubernetes.pod.namespace,io.kubernetes.pod.uid
            - --docker_only=true
            # OrbStack runs Docker with a bundled containerd at a non-default
            # path. cAdvisor's docker factory needs containerd to register;
            # without this flag it logs "no such file or directory" and emits
            # only raw cgroup hierarchy with no Kubernetes pod metadata.
            - --containerd=/var/run/docker/containerd/containerd.sock
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["DAC_READ_SEARCH"]
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 400Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: docker
              mountPath: /var/lib/docker
              readOnly: true
            - name: disk
              mountPath: /dev/disk
              readOnly: true
            - name: machine-id
              mountPath: /etc/machine-id
              readOnly: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: sys
          hostPath:
            path: /sys
        - name: docker
          hostPath:
            path: /var/lib/docker
        - name: disk
          hostPath:
            path: /dev/disk
        - name: machine-id
          hostPath:
            path: /etc/machine-id
            type: File
