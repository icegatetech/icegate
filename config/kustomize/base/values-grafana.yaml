# Grafana - mapped from Docker Compose grafana service

# Anonymous access (dev-only, matches Docker Compose GF_AUTH_* env vars)
grafana.ini:
  users:
    default_theme: system
  auth.anonymous:
    enabled: true
    org_role: Admin
  auth:
    disable_login_form: true

# Datasources provisioning
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://icegate-query.icegate.svc.cluster.local.:3100
        isDefault: true
        editable: false
      - name: Tempo
        type: tempo
        access: proxy
        url: http://icegate-query.icegate.svc.cluster.local.:3200
        isDefault: false
        editable: false
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger-query.observability.svc.cluster.local.:16686
        isDefault: false
        editable: false
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local.:9090
        isDefault: false
        editable: false

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: icegate
        orgId: 1
        folder: Icegate
        type: file
        disableDeletion: false
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards/icegate

dashboardsConfigMaps:
  icegate: grafana-dashboards-icegate

resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 256Mi

testFramework:
  enabled: false

service:
  type: ClusterIP
  port: 3000

persistence:
  enabled: true
  size: 1Gi
