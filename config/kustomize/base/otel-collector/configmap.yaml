apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: log-collector
data:
  config.yaml: |
    receivers:
      file_log:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          # Exclude collector's own logs to prevent feedback loop
          - /var/log/pods/*/otel-collector/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # Detect container log format (CRI-O, CRI-Containerd, Docker)
          - type: router
            id: get-format
            routes:
              - output: parser-docker
                expr: 'body matches "^\\{"'
              - output: parser-crio
                expr: 'body matches "^[^ Z]+ "'
              - output: parser-containerd
                expr: 'body matches "^[^ Z]+Z"'
          # Parse CRI-O format
          - type: regex_parser
            id: parser-crio
            regex: '^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout_type: gotime
              layout: '2006-01-02T15:04:05.999999999Z07:00'
          # Parse CRI-Containerd format
          - type: regex_parser
            id: parser-containerd
            regex: '^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          # Parse Docker format
          - type: json_parser
            id: parser-docker
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          # Extract metadata from file path
          - type: regex_parser
            id: extract_metadata_from_filepath
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]{36})\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$'
            parse_from: attributes["log.file.path"]
            cache:
              size: 128
          # Move parsed body
          - type: move
            from: attributes.log
            to: body
          # Route JSON bodies (Rust tracing-subscriber) vs plain text
          - type: router
            id: detect-json-body
            default: rename-attributes
            routes:
              - output: parse-json-body
                expr: 'body matches "^\\{"'
          # Parse JSON body from Rust tracing-subscriber fmt().json()
          # Format: {"timestamp":"...","level":"INFO","fields":{"message":"..."},"target":"...","span":{...}}
          - type: json_parser
            id: parse-json-body
            output: set-severity
          # Map level field to OTEL severity
          - type: severity_parser
            id: set-severity
            parse_from: attributes.level
            mapping:
              trace: TRACE
              debug: DEBUG
              info: INFO
              warn: WARN
              error: ERROR
            output: check-message
          # Extract body from fields: use fields.message if non-empty,
          # otherwise use the entire fields object (e.g. name, error keys).
          - type: router
            id: check-message
            routes:
              - output: use-message
                expr: 'attributes.fields.message != nil and attributes.fields.message != ""'
            default: use-fields
          - type: move
            id: use-message
            from: attributes.fields.message
            to: body
            output: cleanup-fields
          - type: move
            id: use-fields
            from: attributes.fields
            to: body
            output: cleanup-level
          # Move target to attribute
          - type: move
            id: cleanup-fields
            from: attributes.target
            to: attributes["code.namespace"]
            output: cleanup-level
          # Remove parsed JSON fields that are now redundant
          - type: remove
            id: cleanup-level
            field: attributes.level
            output: cleanup-timestamp
          - type: remove
            id: cleanup-timestamp
            field: attributes.timestamp
            output: cleanup-fields-obj
          # Remove the fields object if still present (use-message path)
          - type: remove
            id: cleanup-fields-obj
            field: attributes.fields
            on_error: send
            output: cleanup-target
          # Move target if still present (use-fields path skipped earlier move)
          - type: move
            id: cleanup-target
            from: attributes.target
            to: attributes["code.namespace"]
            on_error: send
            output: rename-attributes
          # Rename attributes to semantic conventions
          - id: rename-attributes
            type: move
            from: attributes.stream
            to: attributes["log.iostream"]
          - type: move
            from: attributes.container_name
            to: resource["k8s.container.name"]
          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]
          - type: move
            from: attributes.pod_name
            to: resource["k8s.pod.name"]
          - type: move
            from: attributes.restart_count
            to: resource["k8s.container.restart_count"]
          - type: move
            from: attributes.uid
            to: resource["k8s.pod.uid"]

    processors:
      k8s_attributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
            - k8s.cluster.uid
            - service.name
            - service.namespace
          labels:
            - tag_name: service.name
              key: app.kubernetes.io/name
              from: pod
            - tag_name: service.namespace
              key: app.kubernetes.io/part-of
              from: pod
            - tag_name: service.component
              key: app.kubernetes.io/component
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection

      batch: {}

      resource:
        attributes:
          - key: deployment.environment
            value: kubernetes
            action: upsert
          - key: demo.source
            value: kubernetes
            action: upsert

    exporters:
      otlp_http:
        endpoint: http://icegate-ingest.icegate.svc.cluster.local.:4318
        compression: none
        headers:
          X-Scope-OrgID: demo

    service:
      pipelines:
        logs:
          receivers: [file_log]
          processors: [k8s_attributes, batch, resource]
          exporters: [otlp_http]
