# Jaeger tracing - mapped from Docker Compose jaeger all-in-one service

allInOne:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1.5Gi
    limits:
      cpu: 500m
      memory: 1.5Gi

# Disable individual components (all-in-one bundles them)
collector:
  enabled: false
query:
  enabled: false
agent:
  enabled: false
provisionDataStore:
  cassandra: false

storage:
  type: badger
