apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: grafana-dashboards-icegate
    namespace: observability
    files:
      - dashboards/Icegate-Ingest-1769530183590.json
      - dashboards/Nodes-1769530183590.json

resources:
  - namespace-infra.yaml
  - namespace-observability.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 72.6.2
    releaseName: prometheus
    includeCRDs: false
    namespace: observability
    valuesFile: values-prometheus.yaml

  - name: grafana
    repo: https://grafana.github.io/helm-charts
    version: 8.8.2
    releaseName: grafana
    namespace: observability
    valuesFile: values-grafana.yaml

  - name: jaeger
    repo: https://jaegertracing.github.io/helm-charts
    version: 3.4.1
    releaseName: jaeger
    namespace: observability
    valuesFile: values-jaeger.yaml

# Force namespace on resources from charts that omit metadata.namespace.
# Kustomize's namespace transformer doesn't inject it for Helm-inflated
# resources it cannot classify.
patches:
  # Jaeger → observability
  - target:
      name: jaeger
      kind: ServiceAccount
    patch: |
      - op: add
        path: /metadata/namespace
        value: observability
  - target:
      name: jaeger-collector
      kind: Service
    patch: |
      - op: add
        path: /metadata/namespace
        value: observability
  - target:
      name: jaeger-query
      kind: Service
    patch: |
      - op: add
        path: /metadata/namespace
        value: observability
  - target:
      name: jaeger-agent
      kind: Service
    patch: |
      - op: add
        path: /metadata/namespace
        value: observability
  - target:
      name: jaeger
      kind: Deployment
    patch: |
      - op: add
        path: /metadata/namespace
        value: observability
