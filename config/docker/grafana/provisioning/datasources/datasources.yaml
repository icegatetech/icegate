apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://query:3100
    isDefault: true
    editable: false
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false
    editable: false
  - name: Loki (demo)
    type: loki
    access: proxy
    url: http://query:3100
    isDefault: false
    editable: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: demo
  - name: Tempo (demo)
    type: tempo
    access: proxy
    url: http://query:3200
    isDefault: false
    editable: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: demo
